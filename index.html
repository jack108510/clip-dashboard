<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wildrose Clips — Content Dashboard</title>
<meta name="theme-color" content="#0f172a">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0c0f1a;--surface:#141829;--surface2:#1e2336;--surface3:#282d44;--border:#2a3050;--text:#e8ecf4;--muted:#8892a8;--dim:#5a6480;--blue:#4f8cff;--green:#34d399;--red:#f87171;--yellow:#fbbf24;--purple:#a78bfa;--radius:14px}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:12px;font-weight:800;font-size:1rem;letter-spacing:-.2px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo small{font-size:.7rem;color:var(--dim);font-weight:600;margin-left:4px}
.nav-tabs{display:flex;gap:2px}
.nav-tab{color:var(--muted);font-size:.8rem;font-weight:600;padding:8px 14px;border-radius:8px;cursor:pointer;transition:all .15s;border:none;background:none}
.nav-tab:hover{color:var(--text);background:var(--surface2)}.nav-tab.active{color:var(--blue);background:var(--surface2)}
.wrap{max-width:1000px;margin:0 auto;padding:28px 24px}
.page{display:none}.page.active{display:block}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:28px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden}
.metric .label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:6px}
.metric .value{font-size:1.8rem;font-weight:900;line-height:1}
.metric.green .value{color:var(--green)}.metric.blue .value{color:var(--blue)}.metric.yellow .value{color:var(--yellow)}.metric.purple .value{color:var(--purple)}
.metric .sub{font-size:.72rem;color:var(--dim);margin-top:4px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-body{padding:16px 20px}
.badge{font-size:.6rem;font-weight:700;padding:3px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.04em}
.badge-green{background:rgba(52,211,153,.1);color:var(--green)}.badge-red{background:rgba(248,113,113,.1);color:var(--red)}
.badge-blue{background:rgba(79,140,255,.1);color:var(--blue)}.badge-yellow{background:rgba(251,191,36,.1);color:var(--yellow)}
.badge-purple{background:rgba(167,139,250,.1);color:var(--purple)}
.rev-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border)}.rev-row:last-child{border:none}
.rev-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:var(--surface2)}
.rev-info{flex:1;min-width:0}.rev-name{font-size:.85rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rev-meta{font-size:.72rem;color:var(--muted);margin-top:2px}
.rev-bar{height:4px;background:var(--surface3);border-radius:4px;margin-top:6px;overflow:hidden}
.rev-bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.rev-amount{text-align:right;flex-shrink:0}.rev-earned{font-size:.95rem;font-weight:900;color:var(--green)}.rev-budget{font-size:.65rem;color:var(--dim)}
.ch-grid{display:grid;gap:12px}
.ch{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.ch-top{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.ch-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:2px solid var(--border)}
.ch-avatar.on{border-color:var(--green);box-shadow:0 0 12px rgba(52,211,153,.15)}
.ch-name{font-size:1rem;font-weight:800}.ch-id{font-size:.7rem;color:var(--dim);font-family:'SF Mono',Menlo,monospace}
.ch-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.ch-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ch-stat{background:var(--bg);border-radius:10px;padding:10px;text-align:center}
.ch-stat b{display:block;font-size:1.05rem;font-weight:900;color:var(--blue)}.ch-stat small{font-size:.62rem;color:var(--dim);text-transform:uppercase;letter-spacing:.04em}
.camp{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.camp-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px}
.camp-name{font-size:.9rem;font-weight:800}
.camp-desc{font-size:.75rem;color:var(--muted);line-height:1.5;margin-bottom:12px}
.camp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px}
.camp-stat{background:var(--bg);border-radius:8px;padding:10px;text-align:center}
.camp-stat b{display:block;font-size:.88rem;font-weight:900;color:var(--blue)}.camp-stat small{font-size:.6rem;color:var(--dim);text-transform:uppercase}
.camp-rule{margin-top:10px;font-size:.72rem;color:var(--yellow);padding:8px 12px;background:rgba(251,191,36,.06);border-radius:8px;border:1px solid rgba(251,191,36,.1)}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--dim);padding:10px 12px;border-bottom:1px solid var(--border)}
.tbl td{font-size:.8rem;padding:10px 12px;border-bottom:1px solid rgba(42,48,80,.4)}
.tbl a{color:var(--blue);text-decoration:none}.tbl a:hover{text-decoration:underline}
.section{margin-bottom:28px}
.section-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:12px}
footer{padding:24px;text-align:center;font-size:.7rem;color:var(--dim);border-top:1px solid var(--border);margin-top:48px}
@media(max-width:700px){.metrics{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.metrics{grid-template-columns:1fr}.nav-tabs{overflow-x:auto;gap:0}.nav-tab{padding:8px 10px;font-size:.72rem;white-space:nowrap}}
</style>
</head>
<body>
<nav>
  <div class="logo"><div class="logo-icon">🎬</div>Wildrose Clips<small>Dashboard</small></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="go('overview',this)">Overview</button>
    <button class="nav-tab" onclick="go('revenue',this)">Revenue</button>
    <button class="nav-tab" onclick="go('channels',this)">Channels</button>
    <button class="nav-tab" onclick="go('campaigns',this)">Campaigns</button>
    <button class="nav-tab" onclick="go('submissions',this)">Submissions</button>
  </div>
</nav>

<div class="wrap page active" id="pg-overview">
  <div class="metrics" id="ovMetrics"></div>
  <div class="section"><div class="section-label">Revenue by Campaign</div><div class="card"><div class="card-body" id="ovRev"></div></div></div>
  <div class="section"><div class="section-label">Channels</div><div class="ch-grid" id="ovCh"></div></div>
</div>

<div class="wrap page" id="pg-revenue">
  <div class="metrics" id="revMetrics"></div>
  <div class="section"><div class="section-label">Campaign Breakdown</div><div class="card"><div class="card-body" id="revDetail"></div></div></div>
</div>

<div class="wrap page" id="pg-channels">
  <div class="section-label">Channel Configuration</div><div class="ch-grid" id="chList"></div>
</div>

<div class="wrap page" id="pg-campaigns">
  <div class="section-label">Active Whop Campaigns</div><div class="ch-grid" id="campList"></div>
</div>

<div class="wrap page" id="pg-submissions">
  <div class="section-label">Clips Submitted to Whop</div>
  <div class="card" style="overflow-x:auto"><table class="tbl"><thead><tr><th>Clip</th><th>Campaign</th><th>Submitted</th><th>Link</th></tr></thead><tbody id="subTbl"></tbody></table></div>
</div>

<footer>Wildrose Clips · Content Dashboard</footer>

<script>
const CHANNELS=[
{name:"Clip Forge",niche:"Fitness / Entertainment",id:"UCUm90N9YLeupbVSsxXqv4fA",active:true,emoji:"🏋️",posts:3,
 sources:["MrBeast","More Plates More Dates","Fitness podcasts","Gym fails"],
 keywords:["fitness","gym","workout","strength","bodybuilding"]},
{name:"Youloveclips",niche:"Entertainment / Viral",id:"UCgrv7cVj6mD0LqawH9epsRg",active:false,emoji:"😂",posts:3,
 sources:["Viral YouTube","Challenge videos","Entertainment"],
 keywords:["entertainment","viral","clips","funny","challenge"]}
];

const CAMPAIGNS=[
{name:"Nana Prempeh [Viral Clipping]",cpm:1.00,budget:3750,paid:738.50,views:737000,creators:1,age:"5d",
 yt:true,sources:7,handles:["@realnanaprempeh"],
 rules:["Tag @realnanaprempeh in title","Pinned comment with channel link","Clip >10 seconds","No negative/AI/slop"]},
{name:"Bloom Shark Tank [Viral Clipping]",cpm:0.75,budget:12000,paid:5616,views:0,creators:1,age:"5d",
 yt:true,sources:4,handles:["@tap.bloom"],rules:[]},
{name:"David Dobrik [Viral Clipping]",cpm:1.00,budget:3750,paid:2179,views:0,creators:1,age:"5d",
 yt:true,sources:1,handles:[],rules:[]},
{name:"Gawne | Take Me Home",cpm:1.25,budget:2000,paid:333.48,views:255000,creators:1,age:"6d",
 yt:false,sources:2,handles:["@lukegawne"],rules:["TikTok/Instagram only"]},
{name:"Oxis Grey Mullet [Audio]",cpm:1.00,budget:2000,paid:69.68,views:87000,creators:1,age:"5d",
 yt:false,sources:3,handles:[],rules:["TikTok only","Natural caption relating to song vibe"]},
{name:"Whop x Jasontheween",cpm:0.75,budget:10000,paid:4212,views:0,creators:1,age:"5d",
 yt:true,sources:0,handles:[],rules:[]}
];

const SUBMISSIONS=[
{title:"100 Sit-Ups For $100 @realnanaprempeh",camp:"Nana Prempeh",url:"https://youtube.com/shorts/LXUKDsqghVU",at:1777740295},
{title:"100 Sit-Ups For Cash @realnanaprempeh",camp:"Nana Prempeh",url:"https://youtube.com/shorts/N-XDnAWZCAw",at:1777740322},
{title:"She Hit 100 Reps! @realnanaprempeh",camp:"Nana Prempeh",url:"https://youtube.com/shorts/qg-_F7XDfs8",at:1777740350},
{title:"She Did Not Come To Play @realnanaprempeh",camp:"Nana Prempeh",url:"https://youtube.com/shorts/84FBQTM2VYg",at:1777740378},
{title:"Bro Really Did 100 Pushups @realnanaprempeh",camp:"Nana Prempeh",url:"https://youtube.com/shorts/YwG3nM-DBxs",at:1777740396},
{title:"They Were Not Ready @realnanaprempeh",camp:"Nana Prempeh",url:"https://youtube.com/shorts/0gnNH4yFYGk",at:1777740413},
{title:"POV: When the bet goes wrong @realnanaprempeh",camp:"Nana Prempeh",url:"https://youtube.com/shorts/uKlqBQYd3GY",at:1777740430},
{title:"She Actually Did It @realnanaprempeh",camp:"Nana Prempeh",url:"https://youtube.com/shorts/4R3e-hRVqYw",at:1777740448}
];

const fmt=n=>'$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtK=n=>n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(0)+'K':n.toString();

function go(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('pg-'+id).classList.add('active');
  el.classList.add('active');
}

function revHTML(c){
  const pct=c.budget>0?Math.round(c.paid/c.budget*100):0;
  const earned=c.cpm*c.views/1000;
  const color=pct>60?'var(--green)':pct>30?'var(--yellow)':'var(--blue)';
  return `<div class="rev-row">
    <div class="rev-icon">${c.yt?'▶':'♪'}</div>
    <div class="rev-info"><div class="rev-name">${c.name}</div>
    <div class="rev-meta">$${c.cpm.toFixed(2)}/1K · ${fmtK(c.views)} views · Earned: ${fmt(earned)}</div>
    <div class="rev-bar"><div class="rev-bar-fill" style="width:${pct}%;background:${color}"></div></div></div>
    <div class="rev-amount"><div class="rev-earned">${fmt(c.paid)}</div><div class="rev-budget">of ${fmt(c.budget)} · ${pct}%</div></div>
  </div>`;
}

function chHTML(c,full){
  return `<div class="ch">
    <div class="ch-top"><div class="ch-avatar ${c.active?'on':''}">${c.emoji}</div>
    <div><div class="ch-name">${c.name} <span class="badge ${c.active?'badge-green':'badge-red'}">${c.active?'Live':'Paused'}</span></div>
    <div class="ch-id">${c.niche} · ${c.id}</div></div></div>
    <div class="ch-tags">${c.keywords.map(k=>`<span class="badge badge-blue">${k}</span>`).join('')}</div>
    ${full?`<div style="margin-top:10px"><div style="font-size:.65rem;font-weight:700;color:var(--dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em">Sources</div>
    <div class="ch-tags">${c.sources.map(s=>`<span class="badge badge-purple">${s}</span>`).join('')}</div></div>`:''}
    <div class="ch-stats">
      <div class="ch-stat"><b>${c.posts}</b><small>Posts/Day</small></div>
      <div class="ch-stat"><b>${c.sources.length}</b><small>Sources</small></div>
      <div class="ch-stat"><b>${c.active?'ON':'OFF'}</b><small>Status</small></div>
    </div></div>`;
}

function init(){
  const tp=CAMPAIGNS.reduce((s,c)=>s+c.paid,0);
  const tb=CAMPAIGNS.reduce((s,c)=>s+c.budget,0);
  const tv=CAMPAIGNS.reduce((s,c)=>s+c.views,0);
  const te=CAMPAIGNS.reduce((s,c)=>s+c.cpm*c.views/1000,0);
  const yt=CAMPAIGNS.filter(c=>c.yt).length;
  const ac=CHANNELS.filter(c=>c.active).length;

  document.getElementById('ovMetrics').innerHTML=`
    <div class="metric green"><div class="label">Total Revenue</div><div class="value">${fmt(tp)}</div><div class="sub">paid out · ${CAMPAIGNS.length} campaigns</div></div>
    <div class="metric blue"><div class="label">Active Channels</div><div class="value">${ac}</div><div class="sub">${CHANNELS.length} total · ${yt} YT eligible</div></div>
    <div class="metric purple"><div class="label">Clips Submitted</div><div class="value">${SUBMISSIONS.length}</div><div class="sub">awaiting Whop review</div></div>
    <div class="metric yellow"><div class="label">Total Views</div><div class="value">${fmtK(tv)}</div><div class="sub">across all campaigns</div></div>`;

  document.getElementById('ovRev').innerHTML=CAMPAIGNS.map(revHTML).join('');
  document.getElementById('ovCh').innerHTML=CHANNELS.map(c=>chHTML(c,false)).join('');

  document.getElementById('revMetrics').innerHTML=`
    <div class="metric green"><div class="label">Paid Out</div><div class="value">${fmt(tp)}</div><div class="sub">confirmed by Whop</div></div>
    <div class="metric blue"><div class="label">Total Budget</div><div class="value">${fmt(tb)}</div><div class="sub">${fmt(tb-tp)} remaining</div></div>
    <div class="metric yellow"><div class="label">View Revenue</div><div class="value">${fmt(te)}</div><div class="sub">CPM × total views</div></div>
    <div class="metric purple"><div class="label">Avg CPM</div><div class="value">$${(CAMPAIGNS.reduce((s,c)=>s+c.cpm,0)/CAMPAIGNS.length).toFixed(2)}</div><div class="sub">per 1K views</div></div>`;
  document.getElementById('revDetail').innerHTML=CAMPAIGNS.map(revHTML).join('');

  document.getElementById('chList').innerHTML=CHANNELS.map(c=>chHTML(c,true)).join('');

  document.getElementById('campList').innerHTML=CAMPAIGNS.map(c=>`<div class="camp">
    <div class="camp-top"><div class="camp-name">${c.name}</div>
    <span class="badge ${c.yt?'badge-green':'badge-yellow'}">${c.yt?'YouTube':'TikTok Only'}</span></div>
    <div class="camp-desc">$${c.cpm.toFixed(2)}/1K views · Budget: ${fmt(c.budget)} · ${fmtK(c.views)} views · ${c.age}</div>
    <div class="camp-grid">
      <div class="camp-stat"><b>${fmt(c.paid)}</b><small>Earned</small></div>
      <div class="camp-stat"><b>${fmt(c.budget-c.paid)}</b><small>Remaining</small></div>
      <div class="camp-stat"><b>${c.sources}</b><small>Sources</small></div>
      <div class="camp-stat"><b>${c.creators}</b><small>Creators</small></div>
    </div>
    ${c.handles?.length?`<div style="margin-top:10px;font-size:.72rem;color:var(--muted)">Required tags: ${c.handles.map(h=>`<b style="color:var(--blue)">${h}</b>`).join(', ')}</div>`:''}
    ${c.rules?.length?c.rules.map(r=>`<div class="camp-rule">⚠ ${r}</div>`).join(''):''}
  </div>`).join('');

  const st=document.getElementById('subTbl');
  st.innerHTML=SUBMISSIONS.map(s=>`<tr>
    <td style="font-weight:600;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.title}</td>
    <td><span class="badge badge-blue">${s.camp}</span></td>
    <td style="font-size:.75rem;color:var(--muted)">${new Date(s.at*1000).toLocaleDateString()}</td>
    <td><a href="${s.url}" target="_blank">Open ↗</a></td>
  </tr>`).join('');
}

init();
</script>
</body>
</html>
